<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Collector</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- ヘッダー部分 -->
    <header class="popup-header">
      <div class="header-glow"></div>
      <div class="logo-section">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M14 2C7.373 2 2 7.373 2 14s5.373 12 12 12 12-5.373 12-12S20.627 2 14 2z" fill="url(#brain-gradient)" opacity="0.15"/>
            <path d="M9 8h10c0.552 0 1 0.448 1 1v10c0 0.552-0.448 1-1 1H9c-0.552 0-1-0.448-1-1V9c0-0.552 0.448-1 1-1z" stroke="url(#brain-gradient)" stroke-width="1.5" fill="none"/>
            <path d="M11 12h6M11 14.5h6M11 17h4" stroke="url(#brain-gradient)" stroke-width="1.2" stroke-linecap="round"/>
            <path d="M12 8V6.5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1V8" stroke="url(#brain-gradient)" stroke-width="1.5" fill="none"/>
            <defs>
              <linearGradient id="brain-gradient" x1="2" y1="2" x2="26" y2="26">
                <stop offset="0%" stop-color="#818cf8"/>
                <stop offset="50%" stop-color="#a78bfa"/>
                <stop offset="100%" stop-color="#c084fc"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="header-text">
          <h1 class="app-title">Knowledge Collector</h1>
          <span class="app-subtitle">ナレッジベースに保存</span>
        </div>
      </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="popup-main">
      <!-- ページ情報セクション -->
      <section class="info-section">
        <div class="info-card">
          <div class="info-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
            ページタイトル
          </div>
          <div class="info-value" id="page-title">読み込み中...</div>
        </div>

        <div class="info-card">
          <div class="info-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
              <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
            </svg>
            URL
          </div>
          <div class="info-value info-url" id="page-url">読み込み中...</div>
        </div>
      </section>

      <!-- 選択テキストセクション -->
      <section class="selection-section" id="selection-section" style="display: none;">
        <div class="info-card selection-card">
          <div class="info-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 10H3M21 6H3M21 14H3M17 18H3"/>
            </svg>
            選択テキスト
          </div>
          <div class="selection-preview" id="selected-text"></div>
        </div>
      </section>

      <!-- タグ入力セクション -->
      <section class="tags-section">
        <div class="info-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
          タグ（カンマ区切り）
        </div>
        <div class="tag-input-wrapper">
          <div class="tags-container" id="tags-container"></div>
          <input
            type="text"
            id="tag-input"
            class="tag-input"
            placeholder="タグを入力して Enter..."
            autocomplete="off"
          >
        </div>
      </section>

      <!-- 保存ボタン -->
      <button class="save-button" id="save-button">
        <span class="button-content">
          <svg class="button-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          <span class="button-text">ナレッジベースに保存</span>
        </span>
        <span class="button-loading" style="display: none;">
          <div class="spinner"></div>
          <span>保存中...</span>
        </span>
        <span class="button-success" style="display: none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span>保存しました！</span>
        </span>
      </button>

      <!-- ステータスメッセージ -->
      <div class="status-message" id="status-message"></div>
    </main>

    <!-- フッター -->
    <footer class="popup-footer">
      <span class="shortcut-hint">
        <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>S</kbd> でクイック保存
      </span>
      <a href="#" id="options-link" class="options-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        設定
      </a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
