# Knowledge Base System (SiYuan Note & Knowledge Collector API)
# Public URL: https://knowledge.jasonzhou.com/

<VirtualHost *:80>
    ServerName knowledge.jasonzhou.com
    Redirect permanent / https://knowledge.jasonzhou.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName knowledge.jasonzhou.com
    ServerAdmin admin@jasonzhou.com
    Include conf.d/ssl.cnf

    ProxyRequests Off
    ProxyPreserveHost On

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Host "knowledge.jasonzhou.com"

    # Enable WebSocket proxy for SiYuan Note
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/ws(.*) ws://127.0.0.1:6806/ws$1 [P,L]

    # 1. Router API Server (Knowledge Collector)
    # Only proxy specific endpoints of the custom collector to avoid conflicts with SiYuan Note
    ProxyPass /api/collect http://127.0.0.1:3001/api/collect retry=0 timeout=300
    ProxyPassReverse /api/collect http://127.0.0.1:3001/api/collect

    ProxyPass /api/health http://127.0.0.1:3001/api/health retry=0 timeout=10
    ProxyPassReverse /api/health http://127.0.0.1:3001/api/health

    ProxyPass /api/status http://127.0.0.1:3001/api/status retry=0 timeout=10
    ProxyPassReverse /api/status http://127.0.0.1:3001/api/status

    # 2. Main SiYuan Note Application
    ProxyPass / http://127.0.0.1:6806/ retry=0 timeout=300
    ProxyPassReverse / http://127.0.0.1:6806/

    ErrorLog logs/knowledge_system_error_log
    CustomLog logs/knowledge_system_access_log combined
</VirtualHost>
